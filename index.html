<!doctype html>
<html lang="en" class="light" style="background:#f5f5f5;color-scheme:light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Set theme BEFORE any JS runs. Follow the OS unless the user explicitly chose light/dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          // No stored choice (or 'system') → follow the operating system.
          var dark = t === 'dark' || ((!t || t === 'system') && prefersDark);
          var html = document.documentElement;
          html.classList.toggle('dark', dark);
          html.classList.toggle('light', !dark);
          html.style.backgroundColor = dark ? '#141414' : '#f5f5f5';
          html.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <style>
      /* Light mode background until React mounts — matches Yandex Go */
      html, body { background: #f5f5f5; }
      html.dark, html.dark body { background: #141414; }
    </style>
    <title>ProsperaSub - Convenience Subscriptions to Próspera</title>
    <meta name="description" content="Your all-in-one platform for subscriptions and services in the Próspera ecosystem." />
    <meta name="author" content="ProsperaSub" />
    <meta name="keywords" content="prospera, subscriptions, services, cleaning, bitcoin, lightning, prospera village" />

    <!-- Open Graph -->
    <meta property="og:title" content="ProsperaSub - Convenience Subscriptions to Próspera" />
    <meta property="og:description" content="Your all-in-one platform for subscriptions and services in the Próspera ecosystem." />
    <meta property="og:site_name" content="ProsperaSub" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prosperasub.com" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProsperaSub - Convenience Subscriptions to Próspera" />
    <meta name="twitter:description" content="Your all-in-one platform for subscriptions and services in the Próspera ecosystem." />

    <!-- PWA -->
    <meta name="theme-color" content="#F8A31A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ProsperaSub" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Inter Variable — single request covering every weight 100–900 with optical sizing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Force-clear stale SW caches on first load after deploy
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            if (name !== 'prosperasub-v3') caches.delete(name);
          });
        });
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.update(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
