<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProsperaSub | Professional Cleaning Service</title>
    <meta name="description" content="Professional cleaning subscriptions for Prospera Village. Book weekly sessions and pay with Bitcoin Lightning." />
    <meta name="author" content="ProsperaSub" />
    <meta name="keywords" content="cleaning service, bitcoin, lightning, prospera, weekly cleaning" />

    <meta property="og:title" content="ProsperaSub | Professional Cleaning Service" />
    <meta property="og:description" content="Professional cleaning subscriptions for Prospera Village. Pay with Bitcoin Lightning." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA -->
    <meta name="theme-color" content="#F8A31A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ProsperaSub" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Inter Variable — single request covering every weight 100–900 with optical sizing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Force-clear stale SW caches on first load after deploy
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            if (name !== 'prosperasub-v3') caches.delete(name);
          });
        });
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.update(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
